<style>

@media (max-width: 500px) { .sgrid { grid-template-columns: repeat(2, 1fr); } }
.scard { background: #fff; border-radius: 14px; padding: 16px; text-align: center; border: 1px solid #E8E8E8; }

.sbar { display: flex; justify-content: space-between; padding: 8px 12px; border-radius: 8px; font-size: 13px; margin-bottom: 6px; }
.sbox {
  background: #F0FAF0; border-left: 4px solid #2D7A3A; padding: 16px;
  margin: 8px 16px; border-radius: 0 12px 12px 0; font-size: 14px; line-height: 1.6;
}
.sbox strong { color: #1A3C2A; }
.empty { text-align: center; padding: 60px 20px; color: #BBB; }
.empty-icon { font-size: 48px; margin-bottom: 12px; }
.loading { text-align: center; padding: 40px; color: #888; }
.spinner { display: inline-block; width: 24px; height: 24px; border: 3px solid #E8E8E8; border-top-color: #2D7A3A; border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #1A3C2A; color: #fff; padding: 12px 24px; border-radius: 12px; font-size: 14px; font-weight: 600; z-index: 1000; display: none; box-shadow: 0 8px 24px rgba(0,0,0,0.2); }
.content { flex: 1; overflow-y: auto; }
.call-bar {
  background: linear-gradient(135deg, #1565C0, #0D47A1); color: #fff;
  padding: 12px 18px; display: flex; align-items: center; justify-content: space-between;
  animation: callPulse 2s ease-in-out infinite;
}
.call-bar.ringing { background: linear-gradient(135deg, #E65100, #BF360C); }
.call-bar.connected { background: linear-gradient(135deg, #2E7D32, #1B5E20); animation: none; }
@keyframes callPulse { 0%,100% { opacity: 1; } 50% { opacity: 0.85; } }
.call-info { display: flex; flex-direction: column; gap: 2px; }
.call-status { font-size: 13px; font-weight: 700; }
.call-name { font-size: 11px; opacity: 0.8; }
.call-timer { font-family: 'Courier New', monospace; font-size: 18px; font-weight: 700; }
.btn-hangup {
  background: #C62828; color: #fff; border: none; border-radius: 50%;
  width: 44px; height: 44px; font-size: 20px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 2px 8px rgba(198,40,40,0.4);
}
.btn-hangup:active { transform: scale(0.93); }
.call-connecting { display: flex; align-items: center; gap: 8px; }
.call-dot { width: 8px; height: 8px; border-radius: 50%; background: #fff; animation: dotBlink 1.2s infinite; }
.call-dot:nth-child(2) { animation-delay: 0.2s; }
.call-dot:nth-child(3) { animation-delay: 0.4s; }
@keyframes dotBlink { 0%,100% { opacity: 0.3; } 50% { opacity: 1; } }

<body>
<div id="app"><div class="loading" style="min-height:100vh;display:flex;align-items:center;justify-content:center"><div><div class="spinner"></div><div style="margin-top:10px">Loading...</div></div></div></div>
<div class="toast" id="toast"></div>

<script>
const SUPABASE_URL = 'https://mhatwlmbwikvrlcgfojt.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1oYXR3bG1id2lrdnJsY2dmb2p0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzEzNDUzMTQsImV4cCI6MjA4NjkyMTMxNH0.8LefO4aYzYGfmsUb4blBEBLjIoF4CtYJ7xfimdc7lBE';
const TWILIO_TOKEN_URL = SUPABASE_URL + '/functions/v1/twilio-token';
const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let twilioDevice = null;
let activeCall = null;
let callTimer = null;
let callSeconds = 0;

const S = { screen:'login', tab:'queue', caller:null, queue:[], callLog:[], stateFilter:'', search:'', expanded:null, outcome:null, callState:null, callCompany:null };

async function init() {
  try {
    const { data:{ session } } = await db.auth.getSession();
    if (session) await setupCaller(session.user);
  } catch(e) { console.error('Init:', e); }
  render();
}

async function setupCaller(user) {
  const { data: profile, error } = await db.from('profiles').select('*').eq('id', user.id).single();
  if (error) {
    console.error('Profile lookup error:', error);
    S.caller = { id: user.id, name: user.email.split('@')[0], email: user.email, isAdmin: false, states: [] };
  } else {
    S.caller = {
      id: user.id,
      name: profile.name || user.email,
      email: user.email,
      isAdmin: user.email === 'masstp01@gmail.com',
      states: profile.assigned_states ? profile.assigned_states.split(',').map(s=>s.trim()) : [],
    };
  }
  S.screen = 'main';
  await Promise.all([loadQueue(), loadLog()]);
  initTwilio();
}

async function initTwilio() {
  if (typeof Twilio === 'undefined' || !Twilio.Device) {
    console.log('Twilio SDK not loaded yet, retrying in 2s...');
    setTimeout(initTwilio, 2000);
    return;
  }
  try {
    const res = await fetch(TWILIO_TOKEN_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + SUPABASE_KEY },
      body: JSON.stringify({ identity: S.caller?.email || 'caller' })
    });
    const data = await res.json();
    if (data.error) { console.error('Token error:', data.error); toast('Phone not available'); return; }

    twilioDevice = new Twilio.Device(data.token, {
      codecPreferences: [Twilio.Device.Codec.Opus, Twilio.Device.Codec.PCMU],
      closeProtection: true
    });

    twilioDevice.on('registered', () => { console.log('Twilio registered'); toast('Phone connected'); });
    twilioDevice.on('error', (err) => { console.error('Twilio error:', err); toast('Phone error: ' + (err.message || err)); });

    await twilioDevice.register();
    console.log('Twilio device state:', twilioDevice.state);

  } catch(e) {
    console.error('Twilio init failed:', e);
    toast('Phone setup failed');
  }
}

async function loadQueue() {
  try {
    let q = db.from('unclaimed_businesses')
      .select('id, company_name, phone, location_text, zip_code, claim_code, company_description')
      .eq('claimed', false)
      .not('phone', 'is', null).neq('phone', '')
      .order('company_name').limit(500);
    if (S.stateFilter) q = q.ilike('location_text', `%${S.stateFilter}%`);
    const { data, error } = await q;
    if (error) { console.error('Queue:', error); S.queue = []; return; }
    const called = new Set(S.callLog.map(l => String(l.company_id)));
    S.queue = (data||[]).filter(c => !called.has(String(c.id)));
  } catch(e) { console.error(e); S.queue = []; }
}

async function loadLog() {
  try {
    let q = db.from('call_log').select('*').order('created_at', { ascending: false }).limit(500);
    if (S.caller && !S.caller.isAdmin) q = q.eq('caller_id', S.caller.id);
    const { data, error } = await q;
    if (error) { console.error('Log:', error); S.callLog = []; return; }
    S.callLog = data || [];
  } catch(e) { console.error(e); S.callLog = []; }
}

async function doLogin() {
  const email = document.getElementById('l-email').value.trim();
  const pw = document.getElementById('l-pw').value;
  const err = document.getElementById('l-err');
  if (!email || !pw) { err.textContent = 'Enter email and password'; return; }
  const btn = document.querySelector('.btn-login');
  btn.disabled = true; btn.textContent = 'Logging in...'; err.textContent = '';
  try {
    const { data, error } = await db.auth.signInWithPassword({ email, password: pw });
    if (error) { err.textContent = error.message; btn.disabled = false; btn.textContent = 'Log In'; return; }
    await setupCaller(data.user);
    render();
  } catch(e) { err.textContent = 'Connection error'; btn.disabled = false; btn.textContent = 'Log In'; }
}

async function doLogout() { await db.auth.signOut(); S.screen='login'; S.caller=null; S.callLog=[]; S.queue=[]; render(); }

async function logCall(cid) {
  if (!S.outcome) { toast('Select an outcome'); return; }
  const co = S.queue.find(c => String(c.id) === String(cid));
  if (!co) { toast('Company not found'); return; }
  const btn = document.querySelector(`[id="f-${cid}"] .btn-save`);
  if (btn) { btn.disabled = true; btn.textContent = 'Saving...'; }
  const conEl = document.getElementById(`con-${cid}`);
  const notEl = document.getElementById(`not-${cid}`);
  const fuEl = document.getElementById(`fu-${cid}`);
  const entry = {
    caller_id: S.caller.id, caller_name: S.caller.name,
    company_id: cid, company_name: co.company_name, company_phone: co.phone,
    company_location: co.location_text, claim_code: co.claim_code,
    contact_name: conEl?.value?.trim() || '',
    outcome: S.outcome,
    notes: notEl?.value?.trim() || '',
    follow_up_date: fuEl?.value || null,
  };
  try {
    const { error } = await db.from('call_log').insert(entry);
    if (error) {
      console.error('Log save error:', JSON.stringify(error));
      toast('Save failed: ' + (error.message || error.details || 'Unknown error'));
      if (btn) { btn.disabled = false; btn.textContent = 'Save & Next'; }
      return;
    }
    S.callLog.unshift({ ...entry, created_at: new Date().toISOString() });
    S.queue = S.queue.filter(c => String(c.id) !== String(cid));
    const savedOutcome = S.outcome;
    S.expanded = null; S.outcome = null;
    toast(co.company_name + ' — ' + savedOutcome);
    setTimeout(() => render(), 50);
  } catch(e) {
    console.error('Log save exception:', e);
    toast('Error: ' + e.message);
    if (btn) { btn.disabled = false; btn.textContent = 'Save & Next'; }
  }
}

async function startCall(cid, phone) {
  const co = S.queue.find(c => String(c.id) === String(cid));
  if (!co) return;

  if (twilioDevice && twilioDevice.state === 'registered') {
    const cleanNum = phone.replace(/[^\d]/g, '');
    const e164 = cleanNum.startsWith('1') ? '+' + cleanNum : '+1' + cleanNum;

    S.callState = 'ringing';
    S.callCompany = co;
    callSeconds = 0;
    render();

    try {
      activeCall = await twilioDevice.connect({ params: { To: e164 } });

      activeCall.on('ringing', () => { S.callState = 'ringing'; render(); });
      activeCall.on('accept', () => {
        S.callState = 'connected';
        callSeconds = 0;
        callTimer = setInterval(() => { callSeconds++; updateTimer(); }, 1000);
        render();
      });
      activeCall.on('disconnect', onCallEnd);
      activeCall.on('cancel', onCallEnd);
      activeCall.on('error', (err) => {
        console.error('Call error:', err);
        toast('Call failed: ' + (err.message || err));
        onCallEnd();
      });
    } catch(e) {
      console.error('Connect failed:', e);
      toast('Call failed: ' + e.message);
      onCallEnd();
    }
  } else {
    toast('Phone not ready — please wait or refresh');
  }
}

function hangUp() {
  if (activeCall) activeCall.disconnect();
  if (twilioDevice) twilioDevice.disconnectAll();
}

function onCallEnd() {
  if (callTimer) { clearInterval(callTimer); callTimer = null; }
  const company = S.callCompany;
  S.callState = null;
  activeCall = null;
  if (company) {
    S.expanded = company.id;
    S.callCompany = null;
    toast('Call ended (' + formatDuration(callSeconds) + ') — log the outcome');
  }
  render();
}

function updateTimer() {
  const el = document.getElementById('call-timer');
  if (el) el.textContent = formatDuration(callSeconds);
}

function formatDuration(secs) {
  const m = Math.floor(secs / 60);
  const s = secs % 60;
  return m + ':' + s.toString().padStart(2, '0');
}

function skip(cid) { S.queue = S.queue.filter(c => String(c.id) !== String(cid)); S.expanded = null; render(); }
function toggle(id) { S.expanded = S.expanded === id ? null : id; S.outcome = null; render(); }
function pickOutcome(o) {
  S.outcome = o;
  document.querySelectorAll('.pill').forEach(p => p.classList.toggle('on', p.dataset.o === o));
}
async function filterState(st) { S.stateFilter = st; await loadQueue(); render(); }
function doSearch(q) { S.search = q.toLowerCase(); render(); }
function setTab(t) { S.tab = t; render(); }

function render() {
  document.getElementById('app').innerHTML = S.screen === 'login' ? rLogin() : rMain();
}

function rLogin() {
  return `<div class="login-wrap"><div class="login-box">
    <div style="text-align:center;margin-bottom:20px"><svg width="48" height="48" viewBox="0 0 100 100" fill="none"><path d="M50 8 L30 40 L38 40 L22 65 L32 65 L18 90 L82 90 L68 65 L78 65 L62 40 L70 40 Z" fill="#2D7A3A" opacity="0.9"/><rect x="44" y="85" width="12" height="15" rx="2" fill="#5D4037"/></svg></div>
    <h2>CrewFinder Caller Portal</h2>
    <div class="sub">Log in to start calling companies</div>
    <label>Email</label><input type="email" id="l-email" placeholder="you@email.com" autocomplete="email">
    <label>Password</label><input type="password" id="l-pw" placeholder="Password" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()">
    <div class="login-err" id="l-err"></div>
    <button class="btn-login" onclick="doLogin()">Log In</button>
  </div></div>`;
}

function rMain() {
  const today = new Date().toDateString();
  const mt = S.callLog.filter(l => new Date(l.created_at).toDateString()===today && l.caller_id===S.caller?.id);
  const su = mt.filter(l => l.outcome==='Signed Up').length;
  return `
    <div class="hdr"><div class="hdr-left"><h1>CrewFinder Caller</h1><div class="hdr-sub">${S.caller?.name||'Caller'}</div></div>
    <div class="hdr-right"><div class="hdr-stat"><div class="hdr-stat-n">${mt.length}</div><div class="hdr-stat-l">Today</div></div>
    <div class="hdr-stat"><div class="hdr-stat-n">${su}</div><div class="hdr-stat-l">Signups</div></div>
    <button class="btn-out" onclick="doLogout()">Logout</button></div></div>
    ${S.callState ? rCallBar() : ''}
    <div class="tabs">
      <div class="tab ${S.tab==='queue'?'on':''}" onclick="setTab('queue')">Queue <span class="tbadge">${S.queue.length}</span></div>
      <div class="tab ${S.tab==='log'?'on':''}" onclick="setTab('log')">Log</div>
      <div class="tab ${S.tab==='stats'?'on':''}" onclick="setTab('stats')">Stats</div>
      <div class="tab ${S.tab==='script'?'on':''}" onclick="setTab('script')">Script</div>
    </div>
    <div class="content">${S.tab==='queue'?rQueue():S.tab==='log'?rLog():S.tab==='stats'?rStats():rScript()}</div>`;
}

function rQueue() {
  let list = S.queue;
  if (S.search) list = list.filter(c => (c.company_name||'').toLowerCase().includes(S.search)||(c.location_text||'').toLowerCase().includes(S.search));
  const sts = [...new Set(S.queue.map(c => { const m=(c.location_text||'').match(/\b([A-Z]{2})\b/); return m?m[1]:null; }).filter(Boolean))].sort();
  return `<div class="fbar"><select onchange="filterState(this.value)"><option value="">All States</option>${sts.map(s=>`<option value="${s}" ${S.stateFilter===s?'selected':''}>${s}</option>`).join('')}</select>
    <input type="text" placeholder="Search..." oninput="doSearch(this.value)" value="${S.search}"><span class="fcount">${list.length} left</span></div>
    ${list.length===0?'<div class="empty"><div class="empty-icon">Done!</div><p>No companies in queue!<br>Try a different state.</p></div>':''}
    ${list.slice(0,50).map(c=>rCard(c)).join('')}
    ${list.length>50?`<div style="padding:20px;text-align:center;color:#888;font-size:13px">Showing 50 of ${list.length}</div>`:''}`;
}

function rCard(c) {
  const ex = S.expanded===c.id;
  const oc = ['Signed Up','Interested - Follow Up','Left Voicemail','No Answer','Not Interested','Wrong Number'];
  return `<div class="ccard"><div class="ccard-top"><div><div class="cname">${c.company_name}</div>
    <div class="cdetail">${c.location_text||'No location'}${c.zip_code?' · '+c.zip_code:''}</div>
    ${c.phone?`<div class="cphone" style="margin-top:4px"><a href="tel:${c.phone}">${c.phone}</a></div>`:'<div class="cdetail" style="color:#C62828">No phone</div>'}
    </div><span class="ccode">${c.claim_code||'N/A'}</span></div>
    ${c.company_description?`<div class="cdesc">${c.company_description.slice(0,120)}${c.company_description.length>120?'...':''}</div>`:''}
    <div class="cactions">${c.phone?`<button class="btn btn-g" onclick="startCall('${c.id}','${c.phone}')" ${S.callState?'disabled style="opacity:0.5"':''}>Call Now</button>`:''}
    <button class="btn btn-o" onclick="toggle('${c.id}')">${ex?'Cancel':'Log Outcome'}</button>
    <button class="btn btn-s" onclick="skip('${c.id}')">Skip</button></div>
    <div class="lform ${ex?'open':''}" id="f-${c.id}"><label>Outcome</label>
    <div class="pills">${oc.map(o=>`<div class="pill ${S.outcome===o?'on':''}" data-o="${o}" onclick="pickOutcome('${o}')">${o}</div>`).join('')}</div>
    <label>Contact Name</label><input type="text" id="con-${c.id}" placeholder="Who did you speak to?">
    <label>Notes</label><textarea id="not-${c.id}" placeholder="What happened?"></textarea>
    <label>Follow-Up Date</label><input type="date" id="fu-${c.id}">
    <button class="btn-save" onclick="logCall('${c.id}')">Save & Next</button></div></div>`;
}

function rLog() {
  const cl = {'Signed Up':'o-su','Interested - Follow Up':'o-in','Left Voicemail':'o-vm','No Answer':'o-na','Not Interested':'o-ni','Wrong Number':'o-wn'};
  return `<div style="padding:14px 16px 8px;font-size:13px;color:#888">${S.callLog.length} calls logged</div>
    ${S.callLog.length===0?'<div class="empty"><p>No calls yet. Start calling!</p></div>':''}
    ${S.callLog.map(l=>`<div class="lentry"><div class="ltop"><div class="lcomp">${l.company_name}</div>
    <span class="obadge ${cl[l.outcome]||'o-na'}">${l.outcome}</span></div>
    <div class="lmeta">${l.company_location||''} · ${l.company_phone||''}${l.contact_name?' · Spoke to: '+l.contact_name:''}${l.caller_name&&S.caller?.isAdmin?' · Caller: '+l.caller_name:''}</div>
    ${l.notes?`<div class="lnotes">${l.notes}</div>`:''}
    <div class="ltime">${new Date(l.created_at).toLocaleString()}</div></div>`).join('')}`;
}

function rStats() {
  const my = S.caller?.isAdmin ? S.callLog : S.callLog.filter(l=>l.caller_id===S.caller?.id);
  const t=my.length, su=my.filter(l=>l.outcome==='Signed Up').length, int=my.filter(l=>l.outcome==='Interested - Follow Up').length;
  const vm=my.filter(l=>l.outcome==='Left Voicemail').length, na=my.filter(l=>l.outcome==='No Answer').length, ni=my.filter(l=>l.outcome==='Not Interested').length;
  const r = t>0?((su/t)*100).toFixed(1):'0.0';
  const td=new Date().toDateString(), tdc=my.filter(l=>new Date(l.created_at).toDateString()===td), tds=tdc.filter(l=>l.outcome==='Signed Up').length;
  const bs={};
  my.forEach(l=>{ const m=(l.company_location||'').match(/\b([A-Z]{2})\b/); const st=m?m[1]:'??'; if(!bs[st])bs[st]={c:0,s:0}; bs[st].c++; if(l.outcome==='Signed Up')bs[st].s++; });
  return `<div class="sgrid">
    <div class="scard"><div class="snum">${tdc.length}</div><div class="slbl">Calls Today</div></div>
    <div class="scard"><div class="snum">${tds}</div><div class="slbl">Signups Today</div></div>
    <div class="scard"><div class="snum">${t}</div><div class="slbl">Total Calls</div></div>
    <div class="scard"><div class="snum" style="color:${parseFloat(r)>=5?'#2D7A3A':'#D4900E'}">${r}%</div><div class="slbl">Conversion</div></div>
    <div class="scard"><div class="snum">${su}</div><div class="slbl">Total Signups</div></div>
    <div class="scard"><div class="snum">${int}</div><div class="slbl">Follow-Ups</div></div></div>
    <div style="padding:0 16px 16px"><h3 style="font-size:15px;margin-bottom:10px">By Outcome</h3>
    ${[['Signed Up',su,'#DCFCE7','#166534'],['Interested',int,'#FEF3C7','#92400E'],['Voicemail',vm,'#DBEAFE','#1E40AF'],['No Answer',na,'#F5F5F5','#888'],['Not Interested',ni,'#FEE2E2','#991B1B']].map(([l,n,bg,c])=>`<div class="sbar" style="background:${bg}"><span style="color:${c}">${l}</span><span style="font-weight:700;color:${c}">${n}</span></div>`).join('')}
    ${Object.keys(bs).length>0?`<h3 style="font-size:15px;margin:20px 0 10px">By State</h3>${Object.entries(bs).sort((a,b)=>b[1].c-a[1].c).map(([st,d])=>`<div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #F5F5F5;font-size:13px"><span style="font-weight:600">${st}</span><span>${d.c} calls · ${d.s} signups · ${d.c>0?((d.s/d.c)*100).toFixed(0):0}%</span></div>`).join('')}`:''}</div>`;
}

function rScript() {
  return `<div style="padding:16px">
    <h3 style="font-size:16px;margin-bottom:12px;color:#1A3C2A">Call Script</h3>
    <div class="sbox"><strong>Opening:</strong><br>"Hi, this is <em>[YOUR NAME]</em> calling from CrewFinder — we're a free platform that helps tree service companies find climbers and ground crew when they need them. Is this the owner or manager?"</div>
    <div class="sbox" style="margin-top:8px"><strong>If yes:</strong><br>"Great — I'm reaching out because <em>[COMPANY NAME]</em> already has a profile page on our platform. I wanted to let you know so you can claim it for free and start getting matched with skilled workers in your area. It takes about 2 minutes."</div>
    <div class="sbox" style="margin-top:8px"><strong>If gatekeeper:</strong><br>"No worries — could I get the best email to send them the info? We have a free profile set up for <em>[COMPANY NAME]</em> that they can claim."</div>
    <h3 style="font-size:15px;margin:20px 0 10px;color:#1A3C2A">Objection Handling</h3>
    <div class="sbox"><strong>"What is this exactly?"</strong><br>"CrewFinder is like an Indeed but specifically for the tree care industry. Companies post when they need a climber or ground guy, and workers in the area get notified. It's free to sign up."</div>
    <div class="sbox" style="margin-top:8px"><strong>"We're not hiring right now"</strong><br>"Totally understand — most companies use it for those last-minute situations. A climber calls out sick on Monday morning, you need a sub by 7 AM. That's when CrewFinder saves the day."</div>
    <div class="sbox" style="margin-top:8px"><strong>"How much does it cost?"</strong><br>"It's completely free right now. We're building up the network in <em>[STATE]</em> so there's no charge to sign up or claim your page."</div>
    <div class="sbox" style="margin-top:8px"><strong>"Send me an email"</strong><br>"Absolutely — what's the best email? I'll send over a direct link to your company page."</div>
    <div class="sbox" style="margin-top:8px"><strong>"Not interested"</strong><br>"No problem at all. If things change, your page will be there at crewfinder.pages.dev. Have a great day."</div>
    <h3 style="font-size:15px;margin:20px 0 10px;color:#1A3C2A">Voicemail Script</h3>
    <div class="sbox">"Hi, this is <em>[NAME]</em> from CrewFinder. We have a free company profile set up for <em>[COMPANY NAME]</em> on our platform — it's a network for finding tree climbers and ground crew. Visit crewfinder.pages.dev to claim your page. Thanks!"</div>
    <h3 style="font-size:15px;margin:20px 0 10px;color:#1A3C2A">Signup Walkthrough</h3>
    <div class="sbox">"Just go to <strong>crewfinder.pages.dev</strong> on your phone or computer. Click <strong>'I'm a Business'</strong>, put in your name and company name — when you type <em>[COMPANY NAME]</em> it should pop right up. Tap it to claim it. Your claim code is <strong>[CODE]</strong>. That's it — you're set up!"</div>
  </div>`;
}

function rCallBar() {
  const name = S.callCompany?.company_name || 'Unknown';
  const phone = S.callCompany?.phone || '';
  if (S.callState === 'ringing') {
    return `<div class="call-bar ringing">
      <div class="call-info"><div class="call-status">Ringing...</div><div class="call-name">${name} · ${phone}</div></div>
      <div class="call-connecting"><div class="call-dot"></div><div class="call-dot"></div><div class="call-dot"></div></div>
      <button class="btn-hangup" onclick="hangUp()">X</button></div>`;
  }
  return `<div class="call-bar connected">
    <div class="call-info"><div class="call-status">Connected</div><div class="call-name">${name} · ${phone}</div></div>
    <div class="call-timer" id="call-timer">${formatDuration(callSeconds)}</div>
    <button class="btn-hangup" onclick="hangUp()">X</button></div>`;
}

let tt;
function toast(msg) { const t=document.getElementById('toast'); t.textContent=msg; t.style.display='block'; clearTimeout(tt); tt=setTimeout(()=>t.style.display='none',3000); }

init();
</script>
</body>
</html>
