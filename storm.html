<script>
const SUPABASE_URL = 'https://mhatwlmbwikvrlcgfojt.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1oYXR3bG1id2lrdnJsY2dmb2p0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzEzNDUzMTQsImV4cCI6MjA4NjkyMTMxNH0.8LefO4aYzYGfmsUb4blBEBLjIoF4CtYJ7xfimdc7lBE';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
const content = document.getElementById('content');
let filter = 'all';
let posts = [];

// Auth check - redirect to app if not logged in
(async () => {
  const { data: { session } } = await sb.auth.getSession();
  if (!session) { window.location.href = '/app.html'; return; }
})();

const TYPE_LABELS = { storm_need: '🌧️ Need Crew', storm_available: '⚡ Available', subcontract_need: '🤝 Need Sub', subcontract_available: '💪 Sub Available' };
const TYPE_CLASSES = { storm_need: 'badge-storm-need', storm_available: 'badge-storm-avail', subcontract_need: 'badge-sub-need', subcontract_available: 'badge-sub-avail' };
const URG_CLASSES = { emergency: 'badge-emergency', urgent: 'badge-urgent', normal: 'badge-normal' };
const URG_LABELS = { emergency: '🔴 EMERGENCY', urgent: '🟠 URGENT', normal: 'Normal' };

function timeAgo(d) { const m = Math.floor((Date.now() - new Date(d).getTime()) / 60000); if (m < 60) return m + 'm ago'; const h = Math.floor(m/60); if (h < 24) return h + 'h ago'; return Math.floor(h/24) + 'd ago'; }

async function loadPosts() {
  let q = sb.from('storm_board').select('*').eq('is_active', true).order('created_at', { ascending: false }).limit(200);
  if (filter === 'storm') q = q.in('post_type', ['storm_need', 'storm_available']);
  else if (filter === 'sub') q = q.in('post_type', ['subcontract_need', 'subcontract_available']);
  const { data, error } = await q;
  posts = data || [];
  renderBoard();
}

function renderBoard() {
  const hasEmergency = posts.some(p => p.urgency === 'emergency');
  content.innerHTML = `
    ${hasEmergency ? `<div class="alert-banner"><span class="alert-icon">⚠️</span><div><div class="alert-title">Active Emergency Posts</div><div class="alert-desc">Crews needed urgently — respond if you can help</div></div></div>` : ''}
    <div class="filters">
      <button class="filter-pill ${filter === 'all' ? 'active' : ''}" onclick="setFilter('all')">All Posts</button>
      <button class="filter-pill ${filter === 'storm' ? 'active' : ''}" onclick="setFilter('storm')">⛈️ Storm</button>
      <button class="filter-pill ${filter === 'sub' ? 'active' : ''}" onclick="setFilter('sub')">🤝 Subcontract</button>
    </div>
    <div class="section-header">
      <div><span class="section-title">Active Posts</span><span class="count-badge">${posts.length}</span></div>
      <button class="btn-post-new" onclick="showPostForm()">+ Post</button>
    </div>
    ${posts.length === 0 ? `<div class="empty"><div style="font-size:32px;margin-bottom:8px">⛈️</div><div style="font-weight:600;color:#5A6B5E">No active posts</div><div style="font-size:13px;margin-top:4px">Post a storm need or sub request</div></div>` :
    posts.map(p => `
      <div class="card ${p.urgency === 'emergency' ? 'emergency' : ''}">
        <div class="badges">
          <span class="badge ${URG_CLASSES[p.urgency]}">${URG_LABELS[p.urgency]}</span>
          <span class="badge ${TYPE_CLASSES[p.post_type]}">${TYPE_LABELS[p.post_type]}</span>
        </div>
        <div class="card-title">${DOMPurify.sanitize(p.title)}</div>
        <div class="card-poster"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>${DOMPurify.sanitize(p.poster_name)}</div>
        <div class="card-meta">
          <span><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>${DOMPurify.sanitize(p.location)}</span>
          ${p.start_date ? `<span>📅 ${new Date(p.start_date + 'T12:00:00').toLocaleDateString('en-US', {month:'short',day:'numeric'})}${p.end_date ? ' - ' + new Date(p.end_date + 'T12:00:00').toLocaleDateString('en-US', {month:'short',day:'numeric'}) : ''}</span>` : ''}
          ${p.crew_needed ? `<span>👥 ${p.crew_needed} needed</span>` : ''}
        </div>
        ${p.equipment_needed && p.equipment_needed.length ? `<div class="card-equip">${p.equipment_needed.map(eq => `<span class="badge badge-equip">${DOMPurify.sanitize(eq)}</span>`).join('')}</div>` : ''}
        ${p.description ? `<div style="font-size:13px;color:#5A6B5E;margin-bottom:8px;line-height:1.5">${DOMPurify.sanitize(p.description.substring(0, 150))}${p.description.length > 150 ? '...' : ''}</div>` : ''}
        <div class="card-footer">
          <span class="card-pay">${DOMPurify.sanitize(p.pay_rate || 'Contact for rates')}</span>
          <div class="card-footer-right">
            <span class="card-responses">${p.responses_count || 0} responses</span>
            <button class="btn-respond" onclick="respondToPost('${p.id}')">Respond</button>
          </div>
        </div>
      </div>
    `).join('')}
  `;
}

function showPostForm() {
  content.innerHTML = `
    <button class="detail-back" onclick="loadPosts()">← Back to board</button>
    <div style="font-size:20px;font-weight:800;color:#1A3C2A;margin-bottom:16px">Post to Storm/Sub Board</div>
    <form id="stormForm" onsubmit="submitPost(event)">
      <div class="form-group"><label class="form-label">Post Type *</label>
        <select class="form-select" name="post_type"><option value="storm_need">🌧️ Storm — Need Crew</option><option value="storm_available">⚡ Storm — I'm Available</option><option value="subcontract_need">🤝 Need Subcontractor</option><option value="subcontract_available">💪 Available to Sub</option></select>
      </div>
      <div class="form-group"><label class="form-label">Urgency</label>
        <select class="form-select" name="urgency"><option value="normal">Normal</option><option value="urgent">Urgent</option><option value="emergency">Emergency</option></select>
      </div>
      <div class="form-group"><label class="form-label">Title *</label><input class="form-input" name="title" placeholder="Brief description of what you need/offer" required></div>
      <div class="form-group"><label class="form-label">Description</label><textarea class="form-input form-textarea" name="description" placeholder="Details about the job, requirements, etc."></textarea></div>
      <div class="form-group"><label class="form-label">Your Name/Company *</label><input class="form-input" name="poster_name" required></div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">Location *</label><input class="form-input" name="location" placeholder="City, State" required></div>
        <div class="form-group"><label class="form-label">Crew Needed</label><input class="form-input" name="crew_needed" type="number" min="0" placeholder="0"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">Start Date</label><input class="form-input" name="start_date" type="date"></div>
        <div class="form-group"><label class="form-label">End Date</label><input class="form-input" name="end_date" type="date"></div>
      </div>
      <div class="form-group"><label class="form-label">Pay Rate</label><input class="form-input" name="pay_rate" placeholder="e.g. $65/hr, $2500 flat, FEMA rates"></div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">Phone</label><input class="form-input" name="phone" type="tel"></div>
        <div class="form-group"><label class="form-label">Email</label><input class="form-input" name="email" type="email"></div>
      </div>
      <button type="submit" class="btn-primary" style="margin-top:8px">⛈️ Post to Board</button>
    </form>
  `;
}

async function submitPost(e) {
  e.preventDefault();
  const data = Object.fromEntries(new FormData(document.getElementById('stormForm')));
  data.poster_type = 'company';
  data.is_active = true;
  data.responses_count = 0;
  if (data.crew_needed) data.crew_needed = parseInt(data.crew_needed); else delete data.crew_needed;
  if (!data.start_date) delete data.start_date;
  if (!data.end_date) delete data.end_date;
  const btn = e.target.querySelector('button[type="submit"]');
  btn.disabled = true; btn.textContent = 'Posting...';
  const { error } = await sb.from('storm_board').insert([data]);
  if (error) { alert('Error: ' + error.message); btn.disabled = false; btn.textContent = '⛈️ Post to Board'; }
  else { alert('Posted!'); filter = 'all'; await loadPosts(); }
}

function respondToPost(postId) {
  const post = posts.find(p => p.id === postId);
  if (!post) return;

  content.innerHTML = `
    <button class="detail-back" onclick="loadPosts()">← Back to board</button>
    <div style="font-size:20px;font-weight:800;color:#1A3C2A;margin-bottom:16px">Respond to Post</div>
    <div style="background:#E8F5E9;border-radius:12px;padding:12px;margin-bottom:16px;border-left:4px solid #2D7A3A">
      <div style="font-weight:600;color:#2D7A3A;font-size:14px;margin-bottom:4px">${DOMPurify.sanitize(post.title)}</div>
      <div style="font-size:12px;color:#5A6B5E">Posted by ${DOMPurify.sanitize(post.poster_name)} • ${DOMPurify.sanitize(post.location)}</div>
    </div>
    <form id="responseForm" onsubmit="submitResponse(event, '${postId}')">
      <div class="form-group"><label class="form-label">Your Name *</label><input class="form-input" name="responder_name" required></div>
      <div class="form-group"><label class="form-label">Email *</label><input class="form-input" name="email" type="email" required></div>
      <div class="form-group"><label class="form-label">Phone *</label><input class="form-input" name="phone" type="tel" required></div>
      <div class="form-group"><label class="form-label">Message *</label><textarea class="form-input form-textarea" name="message" placeholder="Why you're a good fit, your experience, etc." required></textarea></div>
      <div class="form-group"><label class="form-label">Crew Size Available</label><input class="form-input" name="crew_size" type="number" min="0" placeholder="Number of crew members"></div>
      <div class="form-group"><label class="form-label">Equipment Available</label><input class="form-input" name="equipment" placeholder="e.g., Chainsaws, Bucket truck, etc."></div>
      <button type="submit" class="btn-primary" style="margin-top:8px">Submit Response</button>
    </form>
  `;
}

async function submitResponse(e, postId) {
  e.preventDefault();
  const data = Object.fromEntries(new FormData(document.getElementById('responseForm')));
  data.post_id = postId;
  if (data.crew_size) data.crew_size = parseInt(data.crew_size);
  else delete data.crew_size;

  const btn = e.target.querySelector('button[type="submit"]');
  btn.disabled = true;
  btn.textContent = 'Submitting...';

  const { error } = await sb.from('storm_responses').insert([data]);

  if (error) {
    alert('Error: ' + error.message);
    btn.disabled = false;
    btn.textContent = 'Submit Response';
  } else {
    // Update response count
    const post = posts.find(p => p.id === postId);
    const newCount = (post.responses_count || 0) + 1;
    await sb.from('storm_board').update({ responses_count: newCount }).eq('id', postId);
    alert('Response submitted! The poster will contact you soon.');
    await loadPosts();
  }
}

function setFilter(f) { filter = f; loadPosts(); }

loadPosts();
</script>
