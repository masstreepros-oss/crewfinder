# CrewFinder - static HTML site
[build]
  publish = "."

# Custom 404
[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404

# Security headers - all pages
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"
    Permissions-Policy = "camera=(), microphone=(self), geolocation=(self)"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' cdn.jsdelivr.net cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' fonts.googleapis.com; font-src 'self' fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://mhatwlmbwikvrlcgfojt.supabase.co wss://mhatwlmbwikvrlcgfojt.supabase.co https://fonts.googleapis.com https://fonts.gstatic.com wss://*.twilio.com https://sdk.twilio.com https://media.twiliocdn.com https://eventgw.twilio.com; media-src 'self' https://sdk.twilio.com https://media.twiliocdn.com blob:; frame-ancestors 'none'"

# Cache static assets
[[headers]]
  for = "/*.png"
  [headers.values]
    Cache-Control = "public, max-age=604800"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/*.ico"
  [headers.values]
    Cache-Control = "public, max-age=604800"
